<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>斗篷管理台</title>
    <link rel="stylesheet" href="/admin/styles.css">
  </head>
  <body>
    <svg class="icon-sprite" aria-hidden="true">
      <symbol id="icon-shield" viewBox="0 0 24 24">
        <path d="M12 3l7 2.8v5.8c0 4.6-2.9 7.6-7 9.4-4.1-1.8-7-4.8-7-9.4V5.8L12 3z" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
        <path d="M9 12l2 2 4-5" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      </symbol>
      <symbol id="icon-refresh" viewBox="0 0 24 24">
        <path d="M20 12a8 8 0 1 1-2.3-5.7" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        <path d="M20 4v5h-5" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      </symbol>
      <symbol id="icon-edit" viewBox="0 0 24 24">
        <path d="M4 20h4l10.5-10.5a2.1 2.1 0 0 0-3-3L5 17v3z" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
      </symbol>
      <symbol id="icon-trash" viewBox="0 0 24 24">
        <path d="M5 7h14M10 11v6M14 11v6M8 7l1-3h6l1 3M7 7l1 13h8l1-13" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      </symbol>
      <symbol id="icon-search" viewBox="0 0 24 24">
        <path d="M10.8 18.2a7.4 7.4 0 1 0 0-14.8 7.4 7.4 0 0 0 0 14.8zM16.3 16.3 21 21" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
      </symbol>
      <symbol id="icon-bolt" viewBox="0 0 24 24">
        <path d="m13 2-8 12h6l-1 8 9-13h-6l1-7z" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
      </symbol>
      <symbol id="icon-bell" viewBox="0 0 24 24">
        <path d="M18 9a6 6 0 1 0-12 0c0 7-3 6-3 8h18c0-2-3-1-3-8zM10 20h4" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      </symbol>
      <symbol id="icon-check" viewBox="0 0 24 24">
        <path d="m6 12 4 4 8-8" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"/>
      </symbol>
    </svg>

    <div id="app-shell" class="app-shell">
      <aside class="sidebar" aria-label="主导航">
        <a class="brand" href="/admin" aria-label="斗篷管理台">
          <span class="brand-orbit"></span>
          <span>
            <strong>斗篷管理台</strong>
            <small>自用流量分流控制台</small>
          </span>
        </a>

        <label class="search-field">
          <svg><use href="#icon-search"></use></svg>
          <input aria-label="搜索" placeholder="搜索">
          <kbd>F</kbd>
        </label>

        <p class="nav-heading">菜单</p>
        <nav class="nav-list" aria-label="管理台导航">
          <a class="nav-item is-active" href="#overview">
            <svg><use href="#icon-shield"></use></svg>
            总览
          </a>
          <a class="nav-item" href="#campaigns">
            <svg><use href="#icon-edit"></use></svg>
            活动
          </a>
          <a class="nav-item" href="#logs">
            <svg><use href="#icon-bolt"></use></svg>
            访问日志
          </a>
          <a class="nav-item" href="#analytics-panel">
            <svg><use href="#icon-refresh"></use></svg>
            数据分析
          </a>
        </nav>

        <p class="nav-heading">工具</p>
        <nav class="nav-list support-list" aria-label="支持导航">
          <a class="nav-item" href="#campaign-form-title">
            <svg><use href="#icon-bell"></use></svg>
            系统设置
          </a>
          <a class="nav-item" href="#logs">
            <svg><use href="#icon-search"></use></svg>
            查询记录
          </a>
        </nav>
      </aside>

      <main class="workspace">
        <header class="topbar">
          <div>
            <h1>总览</h1>
            <p>查看当前斗篷分流、访问判定和活动状态</p>
          </div>
          <div class="top-status" aria-label="状态栏">
            <button class="status-button" id="refresh-button" type="button" aria-label="刷新数据">
              <svg><use href="#icon-refresh"></use></svg>
            </button>
            <span class="status-pill">
              <svg><use href="#icon-bolt"></use></svg>
              <strong id="status-visits">0</strong>
            </span>
            <span class="status-badge">
              <svg><use href="#icon-bell"></use></svg>
              本地模式
            </span>
            <form class="token-form" id="token-form">
              <label for="admin-token">管理令牌</label>
              <input id="admin-token" name="adminToken" type="password" autocomplete="current-password" placeholder="输入管理令牌">
              <button class="status-button token-save" type="submit" aria-label="保存令牌">
                <svg><use href="#icon-shield"></use></svg>
              </button>
            </form>
          </div>
        </header>

        <section class="metrics-grid" id="overview" aria-label="数据概览">
          <article class="metric-card is-hot">
            <span class="metric-icon"><svg><use href="#icon-shield"></use></svg></span>
            <strong id="metric-campaigns">0</strong>
            <small>活动总数</small>
          </article>
          <article class="metric-card">
            <span class="metric-icon"><svg><use href="#icon-bolt"></use></svg></span>
            <strong id="metric-visits">0</strong>
            <small>累计访问</small>
          </article>
          <article class="metric-card">
            <span class="metric-icon"><svg><use href="#icon-search"></use></svg></span>
            <strong id="metric-bots">0</strong>
            <small>安全匹配</small>
          </article>
          <article class="metric-card">
            <span class="metric-icon"><svg><use href="#icon-refresh"></use></svg></span>
            <strong id="metric-money">0</strong>
            <small>收益页动作</small>
          </article>
        </section>

        <section class="dashboard-grid" aria-label="运营面板">
          <section class="panel table-panel" id="campaigns" aria-labelledby="campaigns-title">
            <div class="panel-heading">
              <div>
                <h2 id="campaigns-title">活动列表</h2>
                <p>当前启用的分流活动</p>
              </div>
              <a class="ghost-link" href="#campaign-form-title">新建活动</a>
            </div>
            <div class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>活动</th>
                    <th>模式</th>
                    <th>安全页链接</th>
                    <th>收益页链接</th>
                    <th>操作</th>
                  </tr>
                </thead>
                <tbody id="campaigns-table"></tbody>
              </table>
            </div>
          </section>

          <aside class="right-rail" id="analytics-panel">
            <section class="panel chart-panel" aria-labelledby="chart-title">
              <div class="panel-heading">
                <div>
                  <h2 id="chart-title">流量分布</h2>
                  <p>访问判定占比</p>
                </div>
              </div>
              <div class="donut-wrap">
                <div class="donut-chart" id="donut-chart" aria-label="判定分布环形图">
                  <span id="donut-total">0%</span>
                  <small>总计</small>
                </div>
              </div>
              <div class="split-bars" id="verdict-bars"></div>
            </section>

            <section class="panel revenue-panel" aria-labelledby="action-title">
              <div class="panel-heading compact-heading">
                <div>
                  <h2 id="action-title">动作分布</h2>
                  <p>跳转动作占比</p>
                </div>
              </div>
              <div class="action-strip" id="action-strip"></div>
            </section>
          </aside>
        </section>

        <section class="wide-grid">
          <section class="panel logs-panel" id="logs" aria-labelledby="logs-title">
            <div class="panel-heading table-heading">
              <div>
                <h2 id="logs-title">访问日志</h2>
                <p>实时分流记录</p>
              </div>
              <form class="filters" id="log-filters">
                <select id="filter-verdict" aria-label="按判定筛选">
                  <option value="">全部判定</option>
                  <option value="human">正常访客</option>
                  <option value="bot">机器人</option>
                  <option value="suspicious">可疑访问</option>
                </select>
                <select id="filter-action" aria-label="按动作筛选">
                  <option value="">全部动作</option>
                  <option value="money">收益页</option>
                  <option value="safe">安全页</option>
                  <option value="block">拦截</option>
                </select>
                <input id="filter-ip" aria-label="按 IP 筛选" placeholder="IP 地址">
                <button class="secondary-button" type="submit">筛选</button>
              </form>
            </div>
            <div class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>时间</th>
                    <th>活动</th>
                    <th>IP</th>
                    <th>判定</th>
                    <th>动作</th>
                    <th>置信度</th>
                  </tr>
                </thead>
                <tbody id="logs-table"></tbody>
              </table>
            </div>
          </section>

          <section class="panel form-panel" aria-labelledby="campaign-form-title">
            <div class="panel-heading">
              <div>
                <h2 id="campaign-form-title">活动配置</h2>
                <p>安全页与收益页设置</p>
              </div>
            </div>
            <form id="campaign-form" class="campaign-form">
              <input type="hidden" id="campaign-id">
              <label>
                名称
                <input id="campaign-name" name="name" required>
              </label>
              <label>
                安全页链接
                <input id="campaign-safe-url" name="safeUrl" type="url" required>
              </label>
              <label>
                收益页链接
                <input id="campaign-money-url" name="moneyUrl" type="url" required>
              </label>
              <label>
                跳转模式
                <select id="campaign-mode" name="redirectMode">
                  <option value="redirect">直接跳转</option>
                  <option value="iframe">内嵌页</option>
                  <option value="loading">加载页</option>
                </select>
              </label>
              <div class="form-actions">
                <button class="secondary-button" id="reset-campaign-form" type="button">清空</button>
                <button class="primary-button" id="save-campaign-button" type="submit">保存活动</button>
              </div>
            </form>
          </section>
        </section>
      </main>
    </div>

    <div class="modal-backdrop" id="success-modal" hidden>
      <section class="success-dialog" role="dialog" aria-modal="true" aria-labelledby="success-title">
        <button class="modal-close" id="modal-close" type="button" aria-label="关闭弹窗">×</button>
        <div class="success-mark"><svg><use href="#icon-check"></use></svg></div>
        <h2 id="success-title">操作已完成</h2>
        <p id="success-message">修改已成功应用</p>
        <button class="primary-button" id="modal-ok" type="button">知道了</button>
      </section>
    </div>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>
    <script type="module" src="/admin/app.js"></script>
  </body>
</html>
