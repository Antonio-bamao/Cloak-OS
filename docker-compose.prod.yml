services:
  postgres:
    image: postgres:16-alpine
    container_name: cloak-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cloak}
      POSTGRES_USER: ${POSTGRES_USER:-cloak}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env.production}
    volumes:
      - cloak-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
    container_name: cloak-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      - HOST=0.0.0.0
      - PORT=3000
      - MIN_CONFIDENCE=${MIN_CONFIDENCE:-60}
      - BOT_CONFIDENCE=${BOT_CONFIDENCE:-80}
      - BOT_IPS=${BOT_IPS:-}
      - ADMIN_TOKEN=${ADMIN_TOKEN:?Set ADMIN_TOKEN in .env.production}
      - REPOSITORY_DRIVER=postgres
      - DATABASE_URL=postgres://${POSTGRES_USER:-cloak}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-cloak}
      - LOG_FILE_PATH=${LOG_FILE_PATH:-/app/logs/cloak.log}
      - LOG_MAX_BYTES=${LOG_MAX_BYTES:-10485760}
      - LOG_MAX_FILES=${LOG_MAX_FILES:-5}
    volumes:
      - cloak-app-logs:/app/logs
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  cloak-postgres-data:
  cloak-app-logs:
