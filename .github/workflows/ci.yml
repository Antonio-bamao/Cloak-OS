name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    name: Test and validate
    runs-on: ubuntu-latest
    env:
      POSTGRES_PASSWORD: cloak_ci_password
      ADMIN_TOKEN: cloak-ci-admin-token

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Node test suite
        run: node --test

      - name: Check production monitor CLI
        run: npm run monitor:production -- --help

      - name: Check Bot IP sync CLI
        run: npm run bot-ips:sync -- --help

      - name: Validate production Compose config
        run: docker compose -f docker-compose.prod.yml config

      - name: Validate project context
        run: python scripts/validate_context.py --project-root .
